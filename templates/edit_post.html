{% extends "base.html" %}
{% block content %}
<div class="card form-card">
    <h2>Edit Post</h2>
    <form method="POST">
        <label>Content</label>
        <textarea name="content" rows="5">{{ post.content }}</textarea>
        <button type="submit" class="btn">Update Post</button>
    </form>
</div>
{% endblock %}
